    // --- CASE LIST COMPONENT ---
    function CaseList({ cases, allCases, onSelect, title, emptyMsg }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [filterAsesor, setFilterAsesor] = useState('');
      const [showOnlyNew, setShowOnlyNew] = useState(false);

      const uniqueAdvisors = useMemo(() => {
        const advSet = new Set(ADVISORS.map(a => a.name));
        allCases.forEach(c => {
          if (c.asesor && c.asesor !== 'No asignado') advSet.add(c.asesor);
        });
        return Array.from(advSet).sort();
      }, [allCases]);

      // Búsqueda inteligente: si hay texto de búsqueda, busca en TODA la base de datos (allCases).
      // Si no hay texto, respeta la vista de pestañas actual (cases = activos o resueltos).
      const sourceCases = searchTerm.trim() !== '' ? allCases : cases;

      const filtered = sourceCases.filter(c => {
        const term = searchTerm.toLowerCase().trim();
        const matchesSearch = c.nombre.toLowerCase().includes(term) || 
                              c.matricula.toLowerCase().includes(term) ||
                              (c.telefono && c.telefono.includes(term)) ||
                              (c.caseNumber && c.caseNumber.toLowerCase().includes(term));
        const matchesAsesor = filterAsesor === '' || c.asesor === filterAsesor;
        const matchesNew = !showOnlyNew || c.estado === 'Nuevo caso';
        return matchesSearch && matchesAsesor && matchesNew;
      });

      const getInitials = (name) => {
        return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      };

      const getMotivoStyle = (motivo) => {
        switch(motivo) {
          case 'Económico': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
          case 'Falta de tiempo / Horarios': return 'bg-blue-50 text-blue-700 border-blue-200';
          case 'Laboral': return 'bg-orange-50 text-orange-700 border-orange-200';
          case 'Académico': return 'bg-purple-50 text-purple-700 border-purple-200';
          case 'Personal / Salud': return 'bg-rose-50 text-rose-700 border-rose-200';
          default: return 'bg-slate-100 text-slate-700 border-slate-200';
        }
      };

      const getNivelStyle = (nivel) => {
        if (!nivel) return 'text-slate-600 bg-slate-100 border-slate-200';
        if (nivel.includes('Nivel 1')) return 'text-emerald-700 bg-emerald-100 border-emerald-200';
        if (nivel.includes('Nivel 2')) return 'text-amber-700 bg-amber-100 border-amber-200';
        if (nivel.includes('Nivel 3')) return 'text-red-700 bg-red-100 border-red-200';
        if (nivel.includes('Nivel 4')) return 'text-slate-700 bg-slate-200 border-slate-300';
        return 'text-slate-600 bg-slate-100 border-slate-200';
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in w-full">
          <div className="p-4 md:p-5 border-b border-slate-100 flex flex-col xl:flex-row justify-between items-start xl:items-center bg-white gap-4">
            <div className="flex flex-col gap-1 w-full xl:w-auto">
              <h3 className="font-bold text-lg text-slate-800">{title}</h3>
              {title.includes('Activos') && (
                <label className="flex items-center gap-2 text-sm font-medium text-indigo-600 cursor-pointer bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 w-max">
                  <input 
                    type="checkbox" 
                    className="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                    checked={showOnlyNew}
                    onChange={(e) => setShowOnlyNew(e.target.checked)}
                  />
                  Ver solo casos nuevos (sin contactar)
                </label>
              )}
            </div>
            
            <div className="flex flex-col sm:flex-row gap-3 w-full xl:w-auto">
              <select 
                className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium w-full sm:w-auto"
                value={filterAsesor}
                onChange={(e) => setFilterAsesor(e.target.value)}
              >
                <option value="">Todos los asesores</option>
                {uniqueAdvisors.map(a => <option key={a} value={a}>{a}</option>)}
              </select>

              <div className="relative w-full sm:w-72">
                <Search className="absolute left-3 top-3 text-slate-400" size={18} />
                <input 
                  type="text"
                  placeholder="Buscar nombre, matrícula, teléfono..."
                  className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>
            </div>
          </div>
          <div className="overflow-x-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
              <thead>
                <tr className="bg-slate-50/50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-100">
                  <th className="p-4 font-semibold">Matrícula</th>
                  <th className="p-4 font-semibold">Alumno</th>
                  <th className="p-4 font-semibold">Carrera y Modalidad</th>
                  <th className="p-4 font-semibold">Motivo y Nivel</th>
                  <th className="p-4 font-semibold">Estado y Subestado</th>
                  <th className="p-4 font-semibold text-right">Acciones</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {filtered.length === 0 ? (
                  <tr><td colSpan="6" className="p-10 text-center text-slate-500 font-medium">{emptyMsg}</td></tr>
                ) : (
                  filtered.map(c => {
                    const careerInfo = CAREERS.find(car => car.name === c.carrera) || CAREERS[0];
                    return (
                      <tr key={c.id} className="hover:bg-slate-50/80 transition-all cursor-pointer group" onClick={() => onSelect(c.id)}>
                        <td className="p-4">
                          <div className="font-mono text-sm font-bold text-indigo-600 bg-indigo-50 inline-block px-2.5 py-1 rounded-md">{c.matricula}</div>
                        </td>
                        <td className="p-4">
                          <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-inner flex-shrink-0" style={{ backgroundColor: careerInfo.hex }}>
                              {getInitials(c.nombre)}
                            </div>
                            <div>
                              <div className="font-bold text-slate-800">{c.nombre}</div>
                              <div className="flex items-center gap-3 mt-0.5">
                                <span className="text-xs text-slate-500 flex items-center gap-1"><Phone size={10} /> {c.telefono}</span>
                                <span className="text-xs text-slate-500 flex items-center gap-1 border-l border-slate-300 pl-2"><User size={10} /> {c.asesor || 'Sin asesor'}</span>
                              </div>
                            </div>
                          </div>
                        </td>
                        <td className="p-4">
                          <div className="flex flex-col items-start gap-1.5">
                            <span 
                              style={{ backgroundColor: careerInfo.hex + '1A', color: careerInfo.hex, borderColor: careerInfo.hex + '40' }}
                              className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold border"
                            >
                              <span style={{ backgroundColor: careerInfo.hex }} className="w-1.5 h-1.5 rounded-full"></span>
                              {c.carrera}
                            </span>
                            <span className="text-xs text-slate-500 font-bold px-1">{c.modalidad || 'No especificada'}</span>
                          </div>
                        </td>
                        <td className="p-4">
                          <div className="flex flex-col items-start gap-1.5">
                            <span className={`inline-flex px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm ${getMotivoStyle(c.motivo)}`}>
                              {c.motivo}
                            </span>
                            <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold border ${getNivelStyle(c.nivelCaso)}`}>
                              <AlertTriangle size={10} className="mr-1" /> {(c.nivelCaso || '').split('—')[0] || 'Sin nivel'}
                            </span>
                          </div>
                        </td>
                        <td className="p-4">
                          <div className="flex flex-col gap-1.5 items-start">
                            <StatusBadge status={c.estado} />
                            {c.estado === 'Baja definitiva' ? (
                              <div className="mt-1.5 text-[10px] text-red-600 font-bold leading-tight bg-red-50 border border-red-200 px-2 py-0.5 rounded whitespace-normal">
                                {c.tipoBaja || 'NO CONTINUA'} - {c.detalleBaja}
                              </div>
                            ) : (
                              <span className="text-[10px] font-semibold text-slate-600 bg-slate-100 px-2 py-0.5 rounded border border-slate-200 uppercase tracking-wider">
                                {c.subestado || 'Sin subestado'}
                              </span>
                            )}
                            <div className="mt-1 flex flex-col gap-0.5">
                              <span className="text-[10px] text-slate-400">Creado: {c.fecha?.split('-').reverse().join('/') || '-'}</span>
                              {(c.estado === 'Retenido' || c.estado === 'Baja definitiva') && c.fechaResolucion && (
                                <span className="text-[10px] font-bold text-slate-600">Resuelto: {c.fechaResolucion.split('-').reverse().join('/')}</span>
                              )}
                            </div>
                          </div>
                        </td>
                        <td className="p-4 text-right">
                          <button 
                            onClick={(e) => { e.stopPropagation(); onSelect(c.id); }}
                            className="p-2 text-slate-400 group-hover:text-indigo-600 group-hover:bg-indigo-50 rounded-xl transition-all inline-flex items-center gap-1 font-semibold text-sm"
                          >
                            Ver Caso <ChevronRight size={16} />
                          </button>
                        </td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function StatusBadge({ status }) {
      let styles = "bg-slate-100 text-slate-700";
      if (status === 'Retenido') styles = "bg-emerald-100 text-emerald-800 border border-emerald-200";
      if (status === 'Baja definitiva') styles = "bg-red-100 text-red-800 border border-red-200";
      if (status === 'Nuevo caso') styles = "bg-sky-100 text-sky-800 border border-sky-200";
      if (status === 'En seguimiento') styles = "bg-indigo-100 text-indigo-800 border border-indigo-200";
      if (status === 'Esperando respuesta') styles = "bg-amber-100 text-amber-800 border border-amber-200";

      return <span className={`px-2.5 py-1.5 rounded-md text-[11px] uppercase tracking-wider font-bold shadow-sm ${styles}`}>{status}</span>;
    }

    // --- CASE FORM COMPONENT ---
    function CaseForm({ onSave, onCancel, cases = [], onOpenCase }) {
      const [formData, setFormData] = useState({
        matricula: '', nombre: '', telefono: '', carrera: CAREERS[0].name, modalidad: CAREERS[0].modalities[0], tipoAlumno: [], nivelCaso: NIVELES_CASO[0], estado: 'Nuevo caso', subestado: SUB_STATUSES[0], motivo: REASONS[0], empresaAmiga: false, nombreEmpresa: '', observacion: '', tipoBaja: 'NO CONTINUA', detalleBaja: BAJA_SUBCATEGORIES[0], asesor: ADVISORS[0].name
      });

      // Lógica segura para determinar si es un duplicado verdadero (no vacío)
      const inputMatricula = formData.matricula ? String(formData.matricula).trim() : '';
      const duplicateCase = inputMatricula ? cases.find(c => {
         const cMat = c.matricula ? String(c.matricula).trim() : '';
         return cMat === inputMatricula;
      }) : null;
      const isDuplicate = !!duplicateCase;

      const handleSubmit = (e) => {
        e.preventDefault();
        if (isDuplicate) return;

        const dataToSave = {...formData};
        
        if (dataToSave.estado === 'Baja definitiva' || dataToSave.estado === 'Retenido') {
          if (!dataToSave.fechaResolucion) dataToSave.fechaResolucion = new Date().toISOString().split('T')[0];
        } else {
          dataToSave.fechaResolucion = null;
        }

        if (dataToSave.estado === 'Baja definitiva') {
          dataToSave.detalleBaja = dataToSave.detalleBaja === 'Otro' ? (dataToSave.detalleBajaOtro || '') : dataToSave.detalleBaja;
        } else {
          dataToSave.detalleBaja = null;
          dataToSave.tipoBaja = null;
        }

        if (dataToSave.asesor === 'Otro') {
          dataToSave.asesor = (dataToSave.asesorOtro || '').trim() || 'Sin especificar';
        }
        
        // Limpiar campos temporales para no subirlos a Firebase y evitar undefined
        delete dataToSave.asesorOtro;
        delete dataToSave.detalleBajaOtro;

        // Limpiar undefined a nivel de raiz
        Object.keys(dataToSave).forEach(key => {
          if (dataToSave[key] === undefined) delete dataToSave[key];
        });

        onSave(dataToSave);
      };

      const handleCareerChange = (e) => {
        const newCareerName = e.target.value;
        const newCareerObj = CAREERS.find(c => c.name === newCareerName);
        let currentModality = formData.modalidad;

        if (!newCareerObj.modalities.includes(currentModality)) {
          currentModality = newCareerObj.modalities[0];
        }

        setFormData({...formData, carrera: newCareerName, modalidad: currentModality});
      };

      const handleTipoAlumnoChange = (tipo) => {
        setFormData(prev => {
          const newTipos = prev.tipoAlumno.includes(tipo)
            ? prev.tipoAlumno.filter(t => t !== tipo)
            : [...prev.tipoAlumno, tipo];
          return { ...prev, tipoAlumno: newTipos };
        });
      };

      const careerInfo = CAREERS.find(c => c.name === formData.carrera) || CAREERS[0];
      
      return (
        <div 
          className="max-w-3xl mx-auto bg-white rounded-2xl shadow-md border-t-4 p-5 md:p-8 transition-all duration-300 animate-fade-in"
          style={{ borderTopColor: careerInfo.hex }}
        >
          <div className="flex items-center justify-between mb-6 border-b pb-4 border-slate-100">
            <div className="flex items-center gap-3">
               <div className="p-2.5 rounded-xl" style={{ backgroundColor: careerInfo.hex + '20', color: careerInfo.hex }}>
                 <UserPlus size={24} />
               </div>
               <h3 className="text-xl font-bold text-slate-800">
                 Registrar Estudiante
               </h3>
            </div>
          </div>
          
          <form onSubmit={handleSubmit} className="space-y-6">
            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
              <label className="block text-sm font-bold text-slate-700 mb-2">Asesor a cargo de la gestión</label>
              <div className="flex flex-col sm:flex-row gap-3">
                <select className="w-full sm:w-1/2 border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow bg-white"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.asesor} onChange={e => setFormData({...formData, asesor: e.target.value})}>
                  {ADVISORS.map(a => <option key={a.name} value={a.name}>{a.name}</option>)}
                  <option value="Otro">Otro (Ingresar manualmente)</option>
                </select>
                {formData.asesor === 'Otro' && (
                  <input required type="text" placeholder="Nombre del nuevo asesor..." className="w-full sm:w-1/2 border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow animate-fade-in"
                    style={{ '--tw-ring-color': careerInfo.hex }}
                    value={formData.asesorOtro || ''} onChange={e => setFormData({...formData, asesorOtro: e.target.value})} />
                )}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Nombre y Apellido</label>
                <input required type="text" className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Matrícula</label>
                {(() => {
                  const isDuplicate = cases.some(c => c.matricula.trim() === formData.matricula.trim() && c.matricula.trim() !== '');
                  return (
                    <>
                      <input required type="text" className={`w-full border rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow ${isDuplicate ? 'border-red-400 bg-red-50 text-red-900' : 'border-slate-300'}`}
                        style={{ '--tw-ring-color': careerInfo.hex }}
                        value={formData.matricula} onChange={e => setFormData({...formData, matricula: e.target.value})} />
                      {isDuplicate && (
                        <div className="mt-2 p-3 bg-red-50 border border-red-200 rounded-lg animate-fade-in flex flex-col gap-2">
                          <span className="text-red-600 text-xs font-bold flex items-center gap-1"><AlertTriangle size={14}/> Matrícula ya registrada.</span>
                          <button type="button" onClick={() => onOpenCase(duplicateCase.id)} className="text-xs font-bold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 self-start transition-colors bg-white px-2 py-1 rounded border border-indigo-200">
                            Abrir registro original <ChevronRight size={12}/>
                          </button>
                        </div>
                      )}
                    </>
                  );
                })()}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Teléfono Celular</label>
                <input required type="text" placeholder="Ej: 351..." className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.telefono} onChange={e => setFormData({...formData, telefono: e.target.value})} />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Carrera</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.carrera} onChange={handleCareerChange}>
                  {CAREERS.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Modalidad Actual</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.modalidad} onChange={e => setFormData({...formData, modalidad: e.target.value})}>
                  {careerInfo.modalities.map(m => <option key={m} value={m}>{m}</option>)}
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-4 gap-5">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Motivo principal</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.motivo} onChange={e => setFormData({...formData, motivo: e.target.value})}>
                  {REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Nivel de Gravedad</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.nivelCaso} onChange={e => setFormData({...formData, nivelCaso: e.target.value})}>
                  {NIVELES_CASO.map(n => <option key={n} value={n.split('—')[0].trim()}>{n.split('—')[0].trim()}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Estado del caso</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.estado} onChange={e => setFormData({...formData, estado: e.target.value})}>
                  {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1">Subestado</label>
                <select className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 outline-none transition-shadow"
                  style={{ '--tw-ring-color': careerInfo.hex }}
                  value={formData.subestado} onChange={e => setFormData({...formData, subestado: e.target.value})}>
                  {SUB_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>

            {formData.estado === 'Baja definitiva' && (
              <div className="bg-red-50 p-4 rounded-xl border border-red-200 animate-fade-in col-span-full">
                <label className="block text-sm font-bold text-red-800 mb-2">Especificar Tipo y Detalle de la Baja Definitiva</label>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                  <select 
                    className="w-full border border-red-200 bg-white rounded-lg p-2.5 focus:ring-2 focus:ring-red-400 outline-none text-sm text-slate-700"
                    value={formData.tipoBaja || 'NO CONTINUA'} onChange={e => setFormData({...formData, tipoBaja: e.target.value})}>
                    <option value="NO CONTINUA">NO CONTINUA</option>
                    <option value="NO INICIA">NO INICIA</option>
                  </select>
                  <select 
                    className="w-full border border-red-200 bg-white rounded-lg p-2.5 focus:ring-2 focus:ring-red-400 outline-none text-sm text-slate-700"
                    value={formData.detalleBaja || BAJA_SUBCATEGORIES[0]} onChange={e => setFormData({...formData, detalleBaja: e.target.value})}>
                    {BAJA_SUBCATEGORIES.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
                {formData.detalleBaja === 'Otro' && (
                  <input required type="text" placeholder="Escribe el motivo detallado aquí..." className="w-full border border-red-200 bg-white rounded-lg p-2.5 text-sm focus:ring-2 outline-none"
                    value={formData.detalleBajaOtro || ''} onChange={e => setFormData({...formData, detalleBajaOtro: e.target.value})} />
                )}
              </div>
            )}

            <div className="bg-slate-50 p-5 rounded-xl border border-slate-200 space-y-4">
              <h4 className="font-bold text-slate-700 text-sm border-b border-slate-200 pb-2">Perfil del Alumno (Múltiple Selección)</h4>
              
              <div className="flex flex-wrap gap-4">
                {STUDENT_TYPES.map(tipo => (
                  <label key={tipo} className="flex items-center gap-2 cursor-pointer bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm hover:border-indigo-300 transition-colors">
                    <input 
                      type="checkbox" 
                      className="w-4 h-4 rounded border-gray-300 focus:ring-2"
                      style={{ accentColor: careerInfo.hex }}
                      checked={formData.tipoAlumno && formData.tipoAlumno.includes(tipo)}
                      onChange={() => handleTipoAlumnoChange(tipo)}
                    />
                    <span className="text-sm font-bold text-slate-700">{tipo}</span>
                  </label>
                ))}
              </div>

              <div className="pt-2">
                <label className="flex items-center gap-2 cursor-pointer bg-indigo-50/50 px-3 py-2 rounded-lg border border-indigo-100 transition-colors w-fit">
                  <input type="checkbox" className="w-4 h-4 rounded border-gray-300 focus:ring-2"
                    style={{ accentColor: careerInfo.hex }}
                    checked={formData.empresaAmiga} onChange={e => setFormData({...formData, empresaAmiga: e.target.checked, nombreEmpresa: !e.target.checked ? '' : formData.nombreEmpresa})} />
                  <span className="text-sm font-bold text-indigo-900">
                    Posee Convenio "Empresa Amiga" (Ya tiene 20% desc.)
                  </span>
                </label>
                
                {formData.empresaAmiga && (
                  <div className="mt-3 ml-1 animate-fade-in w-full md:w-1/2">
                    <label className="block text-xs font-semibold text-slate-500 mb-1">Nombre de la Empresa</label>
                    <input required type="text" placeholder="Ej: Naranja X, Apex..." className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 outline-none text-sm transition-shadow shadow-sm"
                      style={{ '--tw-ring-color': careerInfo.hex }}
                      value={formData.nombreEmpresa || ''} onChange={e => setFormData({...formData, nombreEmpresa: e.target.value})} />
                  </div>
                )}
              </div>
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-1 flex justify-between items-end">
                Detalle del Motivo / Situación Inicial
              </label>
              <textarea required rows={3} className="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 outline-none transition-shadow"
                style={{ '--tw-ring-color': careerInfo.hex }}
                placeholder="Detalla la situación particular..."
                value={formData.observacion || ''} onChange={e => setFormData({...formData, observacion: e.target.value})}></textarea>
              <p className="text-xs text-slate-500 mt-2">* Nota: Luego podrás añadir un historial detallado paso a paso desde el panel del caso.</p>
            </div>

            <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
              <button type="button" onClick={onCancel} className="px-5 py-2.5 border border-slate-300 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition-colors w-full sm:w-auto">
                Cancelar
              </button>
              <button 
                type="submit" 
                disabled={isDuplicate}
                className="px-5 py-2.5 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all hover:opacity-90 shadow-sm w-full sm:w-auto disabled:opacity-50 disabled:cursor-not-allowed"
                style={{ backgroundColor: isDuplicate ? '#94a3b8' : careerInfo.hex }}
              >
                <Save size={18} /> Guardar Caso
              </button>
            </div>
          </form>
        </div>
      );
    }

    // --- CASE DETAIL COMPONENT ---
    function CaseDetail({ caseData, onBack, onUpdate, onDelete }) {
      const [localData, setLocalData] = useState(caseData);
      
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [showBajaModal, setShowBajaModal] = useState(false);
      
      const [newInteraction, setNewInteraction] = useState('');
      const [interactionType, setInteractionType] = useState('indagacion'); 

      const [editingMsgId, setEditingMsgId] = useState(null);
      const [editingMsgText, setEditingMsgText] = useState("");
      const [deletingMsgId, setDeletingMsgId] = useState(null);

      const historyEndRef = useRef(null);

      useEffect(() => {
        if (caseData) setLocalData(caseData);
      }, [caseData]);

      useEffect(() => {
        historyEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [caseData?.interacciones]);

      if (!caseData) return null;

      const careerInfo = CAREERS.find(c => c.name === caseData.carrera) || CAREERS[0];
      const cleanPhone = caseData.telefono.replace(/\D/g, '');
      
      const isTimeIssue = caseData.motivo.includes('tiempo') || caseData.motivo.includes('Horarios');
      const isEconIssue = caseData.motivo.includes('Económico');

      const currentDiscount = caseData.empresaAmiga ? 20 : 0;
      const extraBaseOffer = caseData.empresaAmiga ? 10 : 20;
      const totalBaseDiscount = currentDiscount + extraBaseOffer; 
      const extraProofOffer = caseData.empresaAmiga ? 20 : 40;
      const totalProofDiscount = currentDiscount + extraProofOffer; 

      // --- INLINE EDITING HANDLERS ---
      const handleBlur = (field, value) => {
        if (caseData[field] !== value) {
          onUpdate({ ...caseData, [field]: value });
        }
      };

      const handleSelectChange = (field, value) => {
        setLocalData({ ...localData, [field]: value });
        onUpdate({ ...caseData, [field]: value });
      };

      const handleCareerChange = (newCareer) => {
        const careerObj = CAREERS.find(c => c.name === newCareer);
        let newModality = localData.modalidad;
        if (!careerObj.modalities.includes(newModality)) {
          newModality = careerObj.modalities[0];
        }
        setLocalData({ ...localData, carrera: newCareer, modalidad: newModality });
        onUpdate({ ...caseData, carrera: newCareer, modalidad: newModality });
      };

      const handleStatusClick = (s) => {
        if (s === 'Baja definitiva') {
          setShowBajaModal(true);
        } else if (s === 'Retenido') {
          onUpdate({ ...caseData, estado: s, detalleBaja: null, tipoBaja: null, fechaResolucion: new Date().toISOString().split('T')[0] });
        } else {
          onUpdate({ ...caseData, estado: s, detalleBaja: null, tipoBaja: null, fechaResolucion: null });
        }
      };

      const confirmBajaDefinitiva = () => {
        const finalReason = localData.detalleBaja === 'Otro' ? localData.detalleBajaOtro : localData.detalleBaja;
        onUpdate({ ...caseData, estado: 'Baja definitiva', tipoBaja: localData.tipoBaja, detalleBaja: finalReason, fechaResolucion: new Date().toISOString().split('T')[0] });
        setShowBajaModal(false);
      };

      // --- GENERADOR DE MENSAJE DE WHATSAPP ---
      const getWhatsAppUrl = () => {
        const asesorName = caseData.asesor && caseData.asesor !== 'No asignado' ? caseData.asesor : 'Lucas';
        const greeting = `Hola, ${caseData.nombre} ${caseData.matricula} ¿cómo estás? 👋\n\nTe escribe ${asesorName} del Departamento Comercial de Cervantes.\n\n`;
        
        let body = '';
        if (caseData.motivo === 'Económico') {
          body = `Vimos que tu solicitud de baja está relacionada con un motivo económico y queríamos saber si podemos ayudarte antes de avanzar con la baja definitiva.\n\nEn algunos casos contamos con ayudas económicas transitorias o alternativas de pago para que los estudiantes puedan continuar el cursado sin tener que dejar la carrera.\n\nSi te parece, lo vemos unos minutos y evaluamos si hay alguna opción que se adapte a tu situación actual.\n\nQuedo atento a lo que nos quieras comentar.`;
        } else if (caseData.motivo === 'Académico') {
          body = `Vimos tu solicitud de baja y el comentario sobre tu disconformidad con la institución. Antes de avanzar con la baja definitiva, me gustaría poder conocer un poco más tu experiencia para entender qué fue lo que ocurrió.\n\nTu devolución es muy importante para nosotros y, si existe alguna forma de mejorar la situación o acompañarte para que puedas continuar, con gusto lo evaluamos.\n\nQuedo atento a lo que nos quieras comentar.`;
        } else {
          body = `Vimos tu solicitud de baja y queríamos consultarte un poco más sobre el motivo, así podemos entender bien tu situación y ver si existe alguna alternativa para acompañarte.\n\n¿Tiene que ver con cuestiones laborales, falta de tiempo, temas de salud o algún otro motivo en particular?\n\nSi querés, contame un poco más y lo vemos juntos.`;
        }
        
        const text = encodeURIComponent(greeting + body);
        return `https://wa.me/${cleanPhone}?text=${text}`;
      };

      const handleWhatsAppClick = () => {
        if (caseData.estado === 'Nuevo caso') {
          onUpdate({ ...caseData, estado: 'En seguimiento' });
        }
      };

      // --- HISTORIAL HANDLERS ---
      const handleAddInteraction = () => {
        if (!newInteraction.trim()) return;
        
        const interaccion = {
          id: Date.now().toString(),
          fecha: new Date().toISOString(),
          texto: newInteraction.trim(),
          rol: interactionType
        };

        const currentInteracciones = caseData.interacciones || [];
        
        if (currentInteracciones.length === 0 && caseData.observacion) {
          currentInteracciones.push({
            id: 'initial',
            fecha: caseData.fecha ? caseData.fecha + 'T00:00:00.000Z' : new Date().toISOString(),
            texto: caseData.observacion,
            rol: 'sistema'
          });
        }

        onUpdate({
          ...caseData,
          interacciones: [...currentInteracciones, interaccion]
        });

        setNewInteraction('');
      };

      const handleEditMsgStart = (msg) => {
        setEditingMsgId(msg.id || 'old');
        setEditingMsgText(msg.texto);
        setDeletingMsgId(null);
      };

      const handleEditMsgCancel = () => {
        setEditingMsgId(null);
        setEditingMsgText("");
      };

      const handleEditMsgSave = () => {
        let finalInteractions = [...(caseData.interacciones || [])];
        
        if (editingMsgId === 'old' || editingMsgId === 'initial') {
          if (finalInteractions.length === 0) {
            finalInteractions = [{
              id: 'initial',
              fecha: caseData.fecha ? caseData.fecha + 'T00:00:00.000Z' : new Date().toISOString(),
              texto: editingMsgText,
              rol: 'sistema'
            }];
          } else {
            const idx = finalInteractions.findIndex(i => i.id === 'initial' || i.id === 'old');
            if (idx !== -1) {
              finalInteractions[idx].texto = editingMsgText;
            }
          }
          
          onUpdate({
            ...caseData,
            observacion: editingMsgText, 
            interacciones: finalInteractions
          });
        } else {
          finalInteractions = finalInteractions.map(i => 
            i.id === editingMsgId ? { ...i, texto: editingMsgText } : i
          );
          onUpdate({
            ...caseData,
            interacciones: finalInteractions
          });
        }
        
        setEditingMsgId(null);
        setEditingMsgText("");
      };

      const handleDeleteMsgConfirm = (msgId) => {
        let finalInteractions = [...(caseData.interacciones || [])];
        
        if (msgId === 'old' || msgId === 'initial') {
          onUpdate({
            ...caseData,
            observacion: '',
            interacciones: finalInteractions.filter(i => i.id !== 'initial' && i.id !== 'old')
          });
        } else {
          onUpdate({
            ...caseData,
            interacciones: finalInteractions.filter(i => i.id !== msgId)
          });
        }
        setDeletingMsgId(null);
      };

      const interacciones = (caseData.interacciones && caseData.interacciones.length > 0) 
        ? caseData.interacciones 
        : (caseData.observacion ? [{id: 'old', fecha: caseData.fecha ? caseData.fecha + 'T12:00:00.000Z' : new Date().toISOString(), texto: caseData.observacion, rol: 'sistema'}] : []);

      const getNivelStyle = (nivel) => {
        if (!nivel) return 'text-slate-600 bg-slate-100 border-slate-200';
        if (nivel.includes('Nivel 1')) return 'text-emerald-700 bg-emerald-100 border-emerald-200';
        if (nivel.includes('Nivel 2')) return 'text-amber-700 bg-amber-100 border-amber-200';
        if (nivel.includes('Nivel 3')) return 'text-red-700 bg-red-100 border-red-200';
        if (nivel.includes('Nivel 4')) return 'text-slate-700 bg-slate-200 border-slate-300';
        return 'text-slate-600 bg-slate-100 border-slate-200';
      };

      const getAsesorColor = (asesorName) => {
        const found = ADVISORS.find(a => a.name === asesorName);
        return found ? found.colorClass : 'bg-slate-100 text-slate-700';
      };

      return (
        <div className="space-y-6 relative animate-fade-in pb-10">
          
          {/* MODAL CONFIRMACIÓN ELIMINAR CASO */}
          {showDeleteModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-fade-in border border-slate-100">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 mx-auto">
                  <Trash2 size={32} />
                </div>
                <h3 className="text-xl font-bold text-center text-slate-800 mb-2">¿Eliminar este caso?</h3>
                <p className="text-center text-slate-500 font-medium mb-8">Esta acción es permanente y se borrará de Firebase.</p>
                <div className="flex flex-col sm:flex-row gap-3">
                  <button onClick={() => setShowDeleteModal(false)} className="flex-1 py-3 px-4 font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">
                    Cancelar
                  </button>
                  <button onClick={() => onDelete(caseData.id)} className="flex-1 py-3 px-4 font-bold text-white bg-red-500 hover:bg-red-600 rounded-xl transition-colors shadow-sm">
                    Sí, eliminar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL DETALLE BAJA DEFINITIVA */}
          {showBajaModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-fade-in border border-slate-100">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 mx-auto">
                  <XCircle size={32} />
                </div>
                <h3 className="text-xl font-bold text-center text-slate-800 mb-2">Confirmar Baja Definitiva</h3>
                <p className="text-center text-slate-500 font-medium mb-6">Por favor, especifica el tipo y motivo final de la baja.</p>
                
                <div className="mb-6 text-left space-y-3">
                  <select 
                    className="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-red-400 outline-none text-slate-700 bg-slate-50"
                    value={localData.tipoBaja || 'NO CONTINUA'} 
                    onChange={e => setLocalData({...localData, tipoBaja: e.target.value})}
                  >
                    <option value="NO CONTINUA">NO CONTINUA</option>
                    <option value="NO INICIA">NO INICIA</option>
                  </select>

                  <select 
                    className="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-red-400 outline-none text-slate-700 bg-slate-50"
                    value={localData.detalleBaja || BAJA_SUBCATEGORIES[0]} 
                    onChange={e => setLocalData({...localData, detalleBaja: e.target.value})}
                  >
                    {BAJA_SUBCATEGORIES.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                  
                  {localData.detalleBaja === 'Otro' && (
                    <div className="animate-fade-in">
                      <input 
                        type="text" 
                        placeholder="Escribe el motivo detallado..." 
                        className="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-red-400 outline-none text-slate-700"
                        value={localData.detalleBajaOtro || ''} 
                        onChange={e => setLocalData({...localData, detalleBajaOtro: e.target.value})}
                        autoFocus
                      />
                    </div>
                  )}
                </div>

                <div className="flex flex-col sm:flex-row gap-3">
                  <button onClick={() => setShowBajaModal(false)} className="flex-1 py-3 px-4 font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">
                    Cancelar
                  </button>
                  <button 
                    onClick={confirmBajaDefinitiva} 
                    disabled={localData.detalleBaja === 'Otro' && !(localData.detalleBajaOtro || '').trim()}
                    className="flex-1 py-3 px-4 font-bold text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors shadow-sm disabled:opacity-50"
                  >
                    Confirmar Baja
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER SECUNDARIO */}
          <div className="flex flex-wrap gap-4 justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors font-bold px-2 py-1">
              <ArrowLeft size={18} /> Volver a la lista
            </button>
            <div className="flex gap-2 w-full sm:w-auto">
              <button 
                onClick={() => setShowDeleteModal(true)}
                className="w-full sm:w-auto flex justify-center items-center gap-2 px-4 py-2 text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-xl transition-colors"
              >
                <Trash2 size={16} /> Borrar Caso
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            {/* Columna Izquierda: Información del Estudiante y Estado (EDITABLE INLINE) */}
            <div className="lg:col-span-1 space-y-6">
              
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 border-t-4" style={{ borderTopColor: careerInfo.hex }}>
                <div className="flex flex-col md:flex-row justify-between items-start mb-4 gap-4">
                  <div className="w-full">
                    <input 
                      type="text"
                      value={localData.nombre}
                      onChange={e => setLocalData({...localData, nombre: e.target.value})}
                      onBlur={e => handleBlur('nombre', e.target.value)}
                      className="text-xl md:text-2xl font-bold text-slate-800 bg-transparent w-full border-b border-transparent hover:border-slate-300 focus:border-indigo-500 outline-none transition-colors pb-1"
                      placeholder="Nombre del alumno"
                    />
                    <input 
                      type="text"
                      value={localData.matricula}
                      onChange={e => setLocalData({...localData, matricula: e.target.value})}
                      onBlur={e => handleBlur('matricula', e.target.value)}
                      className="text-sm font-medium text-slate-500 bg-transparent w-full border-b border-transparent hover:border-slate-300 focus:border-indigo-500 outline-none transition-colors mt-1"
                      placeholder="Matrícula"
                    />
                  </div>
                  <div className="flex flex-col items-start md:items-end flex-shrink-0">
                    <StatusBadge status={caseData.estado} />
                    {caseData.estado === 'Baja definitiva' && caseData.detalleBaja && (
                      <span className="text-[10px] text-red-500 font-bold mt-1 text-left md:text-right max-w-[120px] leading-tight">
                        {caseData.tipoBaja || 'NO CONTINUA'} - {caseData.detalleBaja}
                      </span>
                    )}
                    <div className="mt-2 text-left md:text-right">
                      <p className="text-[10px] text-slate-400">Creado: {caseData.fecha?.split('-').reverse().join('/') || '-'}</p>
                      {(caseData.estado === 'Retenido' || caseData.estado === 'Baja definitiva') && caseData.fechaResolucion && (
                        <p className="text-[10px] font-bold text-slate-600">Resuelto: {caseData.fechaResolucion.split('-').reverse().join('/')}</p>
                      )}
                    </div>
                  </div>
                </div>

                <div className="space-y-4 mt-6">

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Asesor Asignado</p>
                    <select 
                      className={`w-full border rounded-lg p-2 text-sm font-bold outline-none focus:ring-2 shadow-sm ${getAsesorColor(localData.asesor)}`}
                      value={localData.asesor || ''} 
                      onChange={e => handleSelectChange('asesor', e.target.value)}
                    >
                      {ADVISORS.map(a => <option key={a.name} value={a.name}>{a.name}</option>)}
                    </select>
                  </div>
                  
                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Perfil del Alumno</p>
                    <div className="flex flex-wrap gap-2">
                      {STUDENT_TYPES.map(tipo => {
                        const isChecked = localData.tipoAlumno?.includes(tipo);
                        return (
                          <label key={tipo} className={`cursor-pointer px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider rounded border transition-colors ${isChecked ? 'bg-indigo-100 text-indigo-700 border-indigo-300' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>
                            <input 
                              type="checkbox" 
                              className="hidden"
                              checked={isChecked}
                              onChange={() => {
                                const newTipos = isChecked 
                                  ? localData.tipoAlumno.filter(t => t !== tipo)
                                  : [...(localData.tipoAlumno || []), tipo];
                                setLocalData({...localData, tipoAlumno: newTipos});
                                onUpdate({...caseData, tipoAlumno: newTipos});
                              }}
                            />
                            {tipo}
                          </label>
                        );
                      })}
                    </div>
                  </div>

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Nivel de Gravedad</p>
                    <select 
                      className={`w-full border rounded-lg p-2 text-sm font-bold outline-none focus:ring-2 shadow-sm ${getNivelStyle(localData.nivelCaso)}`}
                      value={localData.nivelCaso || NIVELES_CASO[0]} 
                      onChange={e => handleSelectChange('nivelCaso', e.target.value)}
                    >
                      {NIVELES_CASO.map(n => <option key={n} value={n}>{n.split('—')[0].trim()}</option>)}
                    </select>
                  </div>

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Carrera</p>
                    <select 
                      className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400"
                      value={localData.carrera} 
                      onChange={e => handleCareerChange(e.target.value)}
                    >
                      {CAREERS.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                    </select>
                  </div>

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Modalidad Actual</p>
                    <select 
                      className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400"
                      value={localData.modalidad} 
                      onChange={e => handleSelectChange('modalidad', e.target.value)}
                    >
                      {careerInfo.modalities.map(m => <option key={m} value={m}>{m}</option>)}
                    </select>
                  </div>

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Motivo Principal</p>
                    <select 
                      className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400"
                      value={localData.motivo} 
                      onChange={e => handleSelectChange('motivo', e.target.value)}
                    >
                      {REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>

                  <div className="flex flex-col gap-2 bg-indigo-50/50 p-3 rounded-lg border border-indigo-100">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input 
                        type="checkbox" 
                        className="w-4 h-4 rounded border-gray-300"
                        checked={localData.empresaAmiga}
                        onChange={e => {
                          const isChecked = e.target.checked;
                          setLocalData({...localData, empresaAmiga: isChecked, nombreEmpresa: !isChecked ? '' : localData.nombreEmpresa});
                          onUpdate({...caseData, empresaAmiga: isChecked, nombreEmpresa: !isChecked ? '' : localData.nombreEmpresa});
                        }}
                      />
                      <span className="text-xs font-bold text-indigo-900">Convenio Corporativo (Empresa Amiga)</span>
                    </label>
                    {localData.empresaAmiga && (
                      <input 
                        type="text" 
                        value={localData.nombreEmpresa} 
                        onChange={e => setLocalData({...localData, nombreEmpresa: e.target.value})}
                        onBlur={e => handleBlur('nombreEmpresa', e.target.value)}
                        placeholder="Nombre de la Empresa"
                        className="w-full bg-white border border-indigo-200 rounded-lg p-2 text-sm text-indigo-900 outline-none focus:ring-2 focus:ring-indigo-400"
                      />
                    )}
                  </div>

                  <div>
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Teléfono Celular</p>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        value={localData.telefono} 
                        onChange={e => setLocalData({...localData, telefono: e.target.value})}
                        onBlur={e => handleBlur('telefono', e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400"
                      />
                    </div>
                  </div>
                  
                  <div className="pt-2">
                    <a 
                      href={getWhatsAppUrl()} 
                      target="_blank" 
                      rel="noopener noreferrer"
                      onClick={handleWhatsAppClick}
                      className="w-full flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#128C7E] text-white py-3 rounded-xl font-bold transition-colors shadow-sm"
                    >
                      <MessageCircle size={18} /> Contactar por WhatsApp
                    </a>
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                 <h4 className="font-bold text-slate-800 mb-4">Actualizar Estado Final</h4>
                 
                 <div className="mb-4">
                   <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Subestado</label>
                   <select 
                     className="w-full border border-slate-300 rounded-xl p-2.5 focus:ring-2 focus:ring-indigo-400 outline-none text-sm font-medium text-slate-700 bg-slate-50"
                     value={caseData.subestado || SUB_STATUSES[0]}
                     onChange={(e) => onUpdate({ ...caseData, subestado: e.target.value })}
                   >
                     {SUB_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                   </select>
                 </div>

                 <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">Estado General</label>
                 <div className="grid grid-cols-1 gap-2">
                    {STATUSES.map(s => (
                      <button 
                        key={s}
                        onClick={() => handleStatusClick(s)}
                        className={`text-left px-4 py-2.5 rounded-xl border transition-all ${caseData.estado === s ? 'bg-indigo-50 border-indigo-300 text-indigo-700 font-bold ring-1 ring-indigo-500' : 'border-slate-200 text-slate-600 font-medium hover:bg-slate-50'}`}
                      >
                        Marcar como: {s}
                      </button>
                    ))}
                 </div>
                 <p className="text-[10px] text-slate-400 mt-3 italic text-center leading-tight">Nota: Marcar como "Retenido" o "Baja" cerrará y enviará el caso a Casos Resueltos automáticamente.</p>
              </div>

            <div className="lg:col-span-2 space-y-6 flex flex-col">
              
              {/* Tarjetas de Estrategia */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-shrink-0">
                <div className="p-4 border-b border-slate-100 flex items-center justify-between">
                  <h3 className="text-base font-bold text-slate-800 flex items-center gap-2">
                    <Search className="text-indigo-500" size={18}/> Estrategia de Retención Calculada
                  </h3>
                </div>
                
                <div className="p-4 md:p-5 grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-50/50">
                  
                  {/* Estrategia Económica */}
                  <div className={`rounded-xl border shadow-sm bg-white ${isTimeIssue && !isEconIssue ? 'border-slate-200' : 'border-emerald-200'}`}>
                    <div className={`p-3 border-b ${isTimeIssue && !isEconIssue ? 'border-slate-100' : 'border-emerald-100 bg-emerald-50/50 rounded-t-xl'}`}>
                      <h4 className={`text-sm font-bold flex items-center gap-1.5 ${isTimeIssue && !isEconIssue ? 'text-slate-500' : 'text-emerald-800'}`}>
                         Oferta Económica (Semestre)
                      </h4>
                    </div>
                    <div className="p-4">
                      {isTimeIssue && !isEconIssue ? (
                        <p className="text-xs text-slate-500 leading-relaxed font-medium">
                          Motivo de <strong>Tiempo/Laboral</strong> detectado. Enfoque exclusivo en Modalidades. No ofrezca economía salvo pedido explícito.
                        </p>
                      ) : (
                        <div className="space-y-3">
                          {caseData.empresaAmiga ? (
                            <p className="text-[11px] text-emerald-700 bg-emerald-50 p-2 rounded border border-emerald-100">
                              Alumno con <strong>20% activo (Empresa Amiga)</strong>. Ofrecer ayudas sobre cuota base:
                            </p>
                          ) : (
                            <p className="text-[11px] text-emerald-700 bg-emerald-50 p-2 rounded border border-emerald-100">
                              Alumno <strong>SIN descuentos activos</strong>. Ofrecer estas ayudas especiales:
                            </p>
                          )}
                          <div className="flex justify-between items-center text-sm border-b border-slate-100 pb-1.5">
                            <span className="font-bold text-slate-600">Oferta Inicial:</span>
                            <span className="font-extrabold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">{totalBaseDiscount}%</span>
                          </div>
                          <div className="flex justify-between items-center text-sm">
                            <span className="font-bold text-slate-600">Máx. c/Comprobante:</span>
                            <span className="font-extrabold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded">{totalProofDiscount}%</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Opciones de Modalidad */}
                  <div className="bg-white rounded-xl border border-blue-200 shadow-sm overflow-hidden">
                    <div className="p-3 border-b border-blue-100 bg-blue-50/50">
                      <h4 className="text-sm font-bold text-blue-800 flex items-center gap-1.5">Opciones de Cambio Modalidad</h4>
                    </div>
                    <div className="p-4 space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                      {careerInfo.modalities.map(mod => (
                        <div key={mod} className={`rounded-lg p-2.5 border ${caseData.modalidad === mod ? 'border-blue-400 bg-blue-50' : 'border-slate-100 bg-slate-50'}`}>
                          <span className="font-bold text-blue-900 text-xs flex justify-between items-center mb-1">
                            {mod} {caseData.modalidad === mod && <span className="text-[9px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded uppercase">Actual</span>}
                          </span>
                          <span className="text-[11px] text-slate-600 leading-tight block">{MODALITY_RULES[mod]}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                </div>
              </div>

              {/* --- HISTORIAL (BITÁCORA) --- */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-1 min-h-[400px]">
                <div className="p-4 border-b border-slate-100 flex items-center gap-2 bg-slate-50/50 rounded-t-2xl">
                  <Archive size={20} className="text-slate-400" />
                  <h3 className="font-bold text-slate-700">Bitácora de Observaciones y Negociación</h3>
                </div>

                {/* Lista Historial */}
                <div className="flex-1 overflow-y-auto p-4 md:p-5 space-y-4 custom-scrollbar bg-slate-50/30">
                  {interacciones.map((msg, index) => {
                    let d;
                    try {
                      d = new Date(msg.fecha);
                      if(isNaN(d.getTime())) d = new Date();
                    } catch(e) {
                      d = new Date();
                    }
                    
                    const isIndagacion = msg.rol === 'indagacion';
                    const isSeguimiento = msg.rol === 'seguimiento';
                    const isCierre = msg.rol === 'cierre';
                    const isSistema = msg.rol === 'sistema'; 

                    let boxStyle = "border-slate-300 bg-white";
                    let badgeStyle = "bg-slate-100 text-slate-600";
                    let titleStr = "Observación General";

                    if (isIndagacion) {
                      boxStyle = "border-amber-400 bg-amber-50/30";
                      badgeStyle = "bg-amber-100 text-amber-700";
                      titleStr = "Indago el problema";
                    } else if (isSeguimiento) {
                      boxStyle = "border-indigo-400 bg-indigo-50/30";
                      badgeStyle = "bg-indigo-100 text-indigo-700";
                      titleStr = "Seguimiento y negociación";
                    } else if (isCierre) {
                      boxStyle = "border-emerald-400 bg-emerald-50/30";
                      badgeStyle = "bg-emerald-100 text-emerald-700";
                      titleStr = "Cierre";
                    } else if (isSistema) {
                      boxStyle = "border-slate-400 bg-slate-50/30";
                      badgeStyle = "bg-slate-200 text-slate-700";
                      titleStr = "Situación Inicial / Motivo";
                    }

                    const isEditingThis = editingMsgId === (msg.id || 'old');
                    const isDeletingThis = deletingMsgId === (msg.id || 'old');
                    
                    return (
                      <div key={msg.id || index} className={`relative p-4 rounded-xl border-l-4 shadow-sm border-y border-r ${boxStyle} animate-fade-in`}>
                        <div className="flex flex-wrap gap-2 justify-between items-start mb-2">
                          <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${badgeStyle}`}>
                            {titleStr}
                          </span>
                          <div className="flex items-center gap-2 ml-auto">
                            <span className="text-[10px] font-bold text-slate-400">
                              {d.toLocaleDateString()} - {d.getHours()}:{String(d.getMinutes()).padStart(2, '0')}
                            </span>
                            {!isEditingThis && !isDeletingThis && (
                              <div className="flex gap-1 bg-white/50 rounded-md p-0.5 shadow-sm border border-slate-200/50">
                                <button onClick={() => handleEditMsgStart(msg)} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors rounded hover:bg-white" title="Editar observación">
                                  <Edit2 size={12} />
                                </button>
                                <button onClick={() => setDeletingMsgId(msg.id || 'old')} className="p-1 text-slate-400 hover:text-red-600 transition-colors rounded hover:bg-white" title="Eliminar observación">
                                  <Trash2 size={12} />
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                        
                        {isDeletingThis ? (
                          <div className="mt-2 p-3 bg-red-50 border border-red-200 rounded-lg animate-fade-in shadow-inner">
                            <p className="text-xs text-red-800 font-bold mb-3 flex items-center gap-1.5"><AlertCircle size={14}/> ¿Seguro que deseas eliminar este registro del historial?</p>
                            <div className="flex gap-2 justify-end">
                              <button onClick={() => setDeletingMsgId(null)} className="px-3 py-1.5 text-[11px] font-bold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 shadow-sm transition-colors">Cancelar</button>
                              <button onClick={() => handleDeleteMsgConfirm(msg.id || 'old')} className="px-3 py-1.5 text-[11px] font-bold text-white bg-red-500 rounded-lg hover:bg-red-600 shadow-sm transition-colors">Sí, eliminar</button>
                            </div>
                          </div>
                        ) : isEditingThis ? (
                          <div className="mt-2 animate-fade-in">
                            <textarea 
                              className="w-full bg-white border border-indigo-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 custom-scrollbar resize-none shadow-inner"
                              rows={3}
                              value={editingMsgText}
                              onChange={e => setEditingMsgText(e.target.value)}
                              autoFocus
                            />
                            <div className="flex justify-end gap-2 mt-2">
                              <button onClick={handleEditMsgCancel} className="px-3 py-1.5 text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-lg transition-colors shadow-sm">Cancelar</button>
                              <button onClick={handleEditMsgSave} disabled={!editingMsgText.trim()} className="px-3 py-1.5 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm disabled:opacity-50">Guardar Cambios</button>
                            </div>
                          </div>
                        ) : (
                          <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">
                            {msg.texto}
                          </p>
                        )}
                      </div>
                    );
                  })}
                  <div ref={historyEndRef} />
                </div>

                {/* Input Historial */}
                <div className="p-4 md:p-5 bg-white border-t border-slate-100 rounded-b-2xl">
                  <div className="flex flex-col gap-3">
                    <div className="flex flex-wrap items-center gap-2">
                      <select 
                        className="border border-slate-300 text-sm rounded-lg p-2 focus:ring-2 focus:ring-indigo-400 outline-none font-bold text-slate-600 bg-slate-50 w-full sm:w-auto"
                        value={interactionType}
                        onChange={(e) => setInteractionType(e.target.value)}
                      >
                        <option value="indagacion">Indago el problema</option>
                        <option value="seguimiento">Seguimiento y negociación</option>
                        <option value="cierre">Cierre</option>
                      </select>
                      <span className="text-xs text-slate-400 italic hidden sm:inline">Selecciona la etapa.</span>
                    </div>
                    
                    <textarea 
                      rows={3}
                      className="w-full bg-white border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none custom-scrollbar transition-all"
                      placeholder="Redacta la observación..."
                      value={newInteraction}
                      onChange={(e) => setNewInteraction(e.target.value)}
                    ></textarea>

                    <div className="flex justify-end">
                      <button 
                        onClick={handleAddInteraction}
                        disabled={!newInteraction.trim()}
                        className="w-full sm:w-auto px-5 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl text-sm font-bold transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2 shadow-sm"
                      >
                        <PlusCircle size={16} /> Agregar al Historial
                      </button>
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
