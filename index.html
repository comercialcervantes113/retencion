<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retención de Alumnos - Gestión Estudiantil</title>
  
  <!-- Tailwind CSS para los estilos modernos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel para compilar React en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- SheetJS para exportar e importar a Excel real (.xlsx) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Mapa de Importación para React y Lucide Icons -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0"
    }
  }
  </script>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { LayoutDashboard, Users, UserPlus, MessageCircle, Phone, Search, Filter, Save, ChevronRight, ArrowLeft, CheckCircle2, AlertCircle, XCircle, Clock, Edit2, Trash2, Archive, Database, Download, Send, User, MessageSquare, PlusCircle, AlertTriangle, Upload, Menu } from 'lucide-react';
    
    // --- INTEGRACIÓN DE FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBv_sA7DuRKtbDMjDZJSVgzKdMU0YPzGFM",
      authDomain: "retencion-47a35.firebaseapp.com",
      projectId: "retencion-47a35",
      storageBucket: "retencion-47a35.firebasestorage.app",
      messagingSenderId: "166511405178",
      appId: "1:166511405178:web:cf333e09c163fd712bf3c3",
      measurementId: "G-XKJP1X79T8"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    // --- CONFIGURACIÓN Y CONSTANTES ---
    const CAREERS = [
      { name: 'Administración de Empresas', hex: '#8DA248', modalities: ['Presencial', 'Semipresencial'] },
      { name: 'Recursos Humanos', hex: '#B388C2', modalities: ['Presencial', 'Semipresencial', 'Distancia'] },
      { name: 'Marketing', hex: '#FA5D0F', modalities: ['Semipresencial', 'Distancia'] },
      { name: 'Analista de Sistemas', hex: '#00B1E1', modalities: ['Presencial', 'Semipresencial'] },
      { name: 'Desarrollo Web', hex: '#A8927D', modalities: ['Semipresencial'] },
      { name: 'Inteligencia Artificial', hex: '#2D4693', modalities: ['Semipresencial'] },
      { name: 'Higiene y Seguridad', hex: '#F4C01E', modalities: ['Presencial', 'Semipresencial'] },
      { name: 'Gestión Inmobiliaria', hex: '#BB242A', modalities: ['Presencial', 'Semipresencial', 'Distancia'] }
    ];

    const ALL_MODALITIES = ['Presencial', 'Semipresencial', 'Distancia'];

    const MODALITY_RULES = {
      'Presencial': '3 o 4 días de cursado. Aula híbrida (flexible). Examen final presencial en la institución.',
      'Semipresencial': '1 vez por semana. Aula híbrida (flexible). Examen final sincrónico con profesor.',
      'Distancia': 'Contenidos en autogestión/Teams (grabados). Examen sincrónico. Tutorías y 3 encuentros opcionales. Chat con respuesta en 24hs.'
    };

    const STATUSES = ['Nuevo caso', 'En seguimiento', 'Esperando respuesta', 'Retenido', 'Baja definitiva'];
    const SUB_STATUSES = [
      'Solicitud de baja', 
      'Solicitud de postergar su inicio', 
      'Detección por mora', 
      'Detección por inasistencia', 
      'Detección por otro motivo', 
      'Derivado a Bienestar', 
      'Derivado a director de carreras',
      'Solicita ayuda economica para continuar'
    ];

    const REASONS = ['Económico', 'Falta de tiempo / Horarios', 'Laboral', 'Académico', 'Personal / Salud', 'Otro'];
    const STUDENT_TYPES = ['Ingresante', 'Alumno activo', 'Alumno por egresar'];
    const BAJA_SUBCATEGORIES = ['No quiere seguir en Cervantes', 'Solicita postergar para el próximo inicio', 'Otro'];
    const NIVELES_CASO = [
      'Nivel 1 — Riesgo Bajo',
      'Nivel 2 — Riesgo Medio',
      'Nivel 3 — Riesgo Crítico',
      'Nivel 4 — Baja No Económica'
    ];

    const ADVISORS = [
      { name: 'Lucas', colorClass: 'bg-blue-100 text-blue-800' },
      { name: 'Belén', colorClass: 'bg-yellow-100 text-yellow-800' },
      { name: 'Jeremías', colorClass: 'bg-red-100 text-red-800' },
      { name: 'Kiara', colorClass: 'bg-purple-100 text-purple-800' },
      { name: 'Laura', colorClass: 'bg-green-100 text-green-800' }
    ];

    // --- COMPONENTE PRINCIPAL (APP) ---
    function App() {
      const [cases, setCases] = useState([]);
      const [currentView, setCurrentView] = useState('list'); 
      const [selectedCaseId, setSelectedCaseId] = useState(null);
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // --- ESTADOS PARA EXPORTAR BAJAS ---
      const [showExportBajasModal, setShowExportBajasModal] = useState(false);
      const [bajasDateMode, setBajasDateMode] = useState('all'); // 'all' or 'range'
      const [bajasStartDate, setBajasStartDate] = useState('');
      const [bajasEndDate, setBajasEndDate] = useState('');

      // Historial de Navegación del Navegador
      useEffect(() => {
        const handlePopState = (e) => {
          if (e.state && e.state.view) {
            setCurrentView(e.state.view);
            setSelectedCaseId(e.state.caseId);
          } else {
            setCurrentView('list');
            setSelectedCaseId(null);
          }
        };

        window.addEventListener('popstate', handlePopState);
        window.history.replaceState({ view: 'list', caseId: null }, '', '#list');
        
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error("Error al iniciar sesión anónima:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return; 

        const casesRef = collection(db, 'casos');
        const unsubscribe = onSnapshot(casesRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          
          data.sort((a, b) => {
            const numA = parseInt((a.caseNumber || '').split('-')[1] || '0');
            const numB = parseInt((b.caseNumber || '').split('-')[1] || '0');
            return numB - numA;
          });

          setCases(data);
          setLoading(false);
        }, (error) => {
          console.error("Error al sincronizar con Firebase:", error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // Protección contra borrado cruzado (evita pantalla blanca)
      useEffect(() => {
        if (currentView === 'detail' && selectedCaseId && cases.length > 0) {
          const caseExists = cases.some(c => c.id === selectedCaseId);
          if (!caseExists) {
            navigateTo('list');
          }
        }
      }, [cases, currentView, selectedCaseId]);

      const navigateTo = (view, caseId = null) => {
        window.history.pushState({ view, caseId }, '', `#${view}${caseId ? '/' + caseId : ''}`);
        setCurrentView(view);
        setSelectedCaseId(caseId);
        setIsSidebarOpen(false); 
      };

      const handleSaveCase = async (newCase) => {
        try {
          const cleanCase = { ...newCase };
          
          Object.keys(cleanCase).forEach(key => {
            if (cleanCase[key] === undefined) {
              delete cleanCase[key];
            }
          });

          if (cleanCase.id) {
            const docRef = doc(db, 'casos', cleanCase.id);
            const { id, ...caseData } = cleanCase;
            await updateDoc(docRef, caseData);
          } else {
            const casesRef = collection(db, 'casos');
            const currentCount = cases.length + 1;
            const caseNumber = `CASO-${String(currentCount).padStart(3, '0')}`;
            
            let interacciones = [];
            if (cleanCase.observacion) {
              interacciones.push({
                id: Date.now().toString(),
                fecha: new Date().toISOString(),
                texto: cleanCase.observacion,
                rol: 'sistema' 
              });
            }

            const docData = { 
              ...cleanCase, 
              caseNumber, 
              fecha: new Date().toISOString().split('T')[0],
              interacciones: interacciones
            };
            
            const docRef = await addDoc(casesRef, docData);
            navigateTo('detail', docRef.id);
          }
        } catch (error) {
          console.error("Error al guardar en Firebase:", error);
        }
      };

      const handleDeleteCase = async (id) => {
        try {
          const deletedCase = cases.find(c => c.id === id);
          if (!deletedCase) return;
          
          if (deletedCase.estado === 'Retenido' || deletedCase.estado === 'Baja definitiva') {
            navigateTo('resolved');
          } else {
            navigateTo('list');
          }

          const docRef = doc(db, 'casos', id);
          await deleteDoc(docRef);
        } catch (error) {
          console.error("Error al eliminar de Firebase:", error);
        }
      };

      const handleExportExcel = () => {
        const dataToExport = cases.map(c => {
          let historialTxt = '';
          if (c.interacciones && c.interacciones.length > 0) {
            historialTxt = c.interacciones.map(i => {
              const d = new Date(i.fecha);
              const dateStr = !isNaN(d) ? `${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}` : '';
              const rol = i.rol === 'indagacion' ? 'INDAGO EL PROBLEMA' : 
                          i.rol === 'seguimiento' ? 'SEGUIMIENTO Y NEGOCIACIÓN' : 
                          i.rol === 'cierre' ? 'CIERRE' : 'MOTIVO INICIAL';
              return `[${dateStr}] ${rol}: ${i.texto}`;
            }).join(' || ');
          } else {
            historialTxt = c.observacion || '';
          }

          let estadoExport = c.estado;
          if (c.estado === 'Baja definitiva' && c.detalleBaja) {
            estadoExport = `Baja definitiva - ${c.tipoBaja || 'NO CONTINUA'} (${c.detalleBaja})`;
          }

          return {
            'Nº Caso': c.caseNumber,
            'Asesor': c.asesor || 'No asignado',
            'Matrícula': c.matricula,
            'Nombre': c.nombre,
            'Teléfono': c.telefono,
            'Carrera': c.carrera,
            'Modalidad': c.modalidad || 'No especificada',
            'Tipo Alumno': c.tipoAlumno && c.tipoAlumno.length > 0 ? c.tipoAlumno.join(', ') : 'No especificado',
            'Nivel de Caso': c.nivelCaso || 'No especificado',
            'Motivo Principal': c.motivo,
            'Estado': estadoExport,
            'Subestado': c.subestado || 'No especificado',
            'Empresa Amiga': c.empresaAmiga ? 'Sí' : 'No',
            'Nombre Empresa': c.nombreEmpresa || '-',
            'Historial de Observaciones': historialTxt,
            'Fecha de Registro': c.fecha
          };
        });

        const worksheet = window.XLSX.utils.json_to_sheet(dataToExport);
        const workbook = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(workbook, worksheet, "Casos Retención");
        window.XLSX.writeFile(workbook, `Reporte_Retencion_${new Date().toISOString().split('T')[0]}.xlsx`);
      };

      const handleExportBajas = () => {
        let filteredBajas = cases.filter(c => c.estado === 'Baja definitiva');
        
        if (bajasDateMode === 'range') {
          if (!bajasStartDate || !bajasEndDate) {
            alert('Por favor selecciona la fecha de inicio y de fin.');
            return;
          }
          filteredBajas = filteredBajas.filter(c => {
            const dateToCompare = c.fechaResolucion || c.fecha;
            return dateToCompare >= bajasStartDate && dateToCompare <= bajasEndDate;
          });
        }

        if (filteredBajas.length === 0) {
          alert('No se encontraron bajas definitivas en el rango seleccionado.');
          return;
        }

        const dataToExport = filteredBajas.map(c => {
          let historialTxt = '';
          if (c.interacciones && c.interacciones.length > 0) {
            historialTxt = c.interacciones.map(i => {
              const d = new Date(i.fecha);
              const dateStr = !isNaN(d) ? `${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}` : '';
              const rol = i.rol === 'indagacion' ? 'INDAGO EL PROBLEMA' : 
                          i.rol === 'seguimiento' ? 'SEGUIMIENTO Y NEGOCIACIÓN' : 
                          i.rol === 'cierre' ? 'CIERRE' : 'MOTIVO INICIAL';
              return `[${dateStr}] ${rol}: ${i.texto}`;
            }).join(' || ');
          } else {
            historialTxt = c.observacion || '';
          }

          const estadoExport = `Baja definitiva - ${c.tipoBaja || 'NO CONTINUA'} (${c.detalleBaja})`;

          return {
            'Nº Caso': c.caseNumber,
            'Asesor': c.asesor || 'No asignado',
            'Matrícula': c.matricula,
            'Nombre': c.nombre,
            'Teléfono': c.telefono,
            'Carrera': c.carrera,
            'Modalidad': c.modalidad || 'No especificada',
            'Tipo Alumno': c.tipoAlumno && c.tipoAlumno.length > 0 ? c.tipoAlumno.join(', ') : 'No especificado',
            'Nivel de Caso': c.nivelCaso || 'No especificado',
            'Motivo Principal': c.motivo,
            'Estado Final': estadoExport,
            'Empresa Amiga': c.empresaAmiga ? 'Sí' : 'No',
            'Nombre Empresa': c.nombreEmpresa || '-',
            'Historial de Observaciones': historialTxt,
            'Fecha de Registro': c.fecha,
            'Fecha de Baja': c.fechaResolucion || c.fecha
          };
        });

        const worksheet = window.XLSX.utils.json_to_sheet(dataToExport);
        const workbook = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(workbook, worksheet, "Bajas");
        window.XLSX.writeFile(workbook, `Reporte_Bajas_${new Date().toISOString().split('T')[0]}.xlsx`);
        
        setShowExportBajasModal(false);
      };

      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
           try {
              const data = new Uint8Array(event.target.result);
              const workbook = window.XLSX.read(data, {type: 'array'});
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              const json = window.XLSX.utils.sheet_to_json(worksheet);

              const casesRef = collection(db, 'casos');
              let count = cases.length;
              let importedCount = 0;
              let skippedCount = 0;
              
              const existingMatriculas = new Set(cases.map(c => String(c.matricula || '').trim()).filter(m => m !== ''));
              
              for(let row of json) {
                  const mat = String(row['Matrícula'] || '').trim();
                  
                  if (mat && existingMatriculas.has(mat)) {
                      skippedCount++;
                      continue;
                  }
                  
                  if (mat) {
                      existingMatriculas.add(mat);
                  }

                  count++;
                  const caseNumber = row['Nº Caso'] || `CASO-${String(count).padStart(3, '0')}`;
                  
                  const newCase = {
                      caseNumber: caseNumber,
                      asesor: row['Asesor'] || ADVISORS[0].name,
                      matricula: mat,
                      nombre: row['Nombre'] || 'Alumno Importado',
                      telefono: String(row['Teléfono'] || ''),
                      carrera: row['Carrera'] || CAREERS[0].name,
                      modalidad: row['Modalidad'] || 'Presencial',
                      nivelCaso: row['Nivel de Caso'] || NIVELES_CASO[0],
                      estado: row['Estado'] && row['Estado'].includes('Baja') ? 'Baja definitiva' : (row['Estado'] || 'Nuevo caso'),
                      subestado: row['Subestado'] || SUB_STATUSES[0],
                      motivo: row['Motivo Principal'] || REASONS[0],
                      empresaAmiga: row['Empresa Amiga'] === 'Sí',
                      nombreEmpresa: row['Nombre Empresa'] !== '-' ? (row['Nombre Empresa'] || '') : '',
                      observacion: row['Historial de Observaciones'] || 'Caso importado desde Excel externo.', 
                      fecha: row['Fecha de Registro'] || new Date().toISOString().split('T')[0],
                      tipoAlumno: []
                  }
                  await addDoc(casesRef, newCase);
                  importedCount++;
              }
              
              let alertMsg = `¡Se importaron ${importedCount} casos exitosamente!`;
              if (skippedCount > 0) {
                 alertMsg += `\nSe omitieron ${skippedCount} casos porque la matrícula ya existía en el sistema.`;
              }
              alert(alertMsg);

           } catch(err) {
              console.error("Error importando:", err);
              alert("Hubo un error importando el Excel. Revisa el formato de las columnas.");
           }
           e.target.value = null; 
        };
        reader.readAsArrayBuffer(file);
      };

      if (loading) {
        return (
          <div className="flex h-screen w-full items-center justify-center bg-slate-50">
            <div className="flex flex-col items-center gap-4">
              <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <p className="text-indigo-600 font-bold animate-pulse">Conectando con la base de datos...</p>
            </div>
          </div>
        );
      }

      const activeCases = cases.filter(c => c.estado !== 'Retenido' && c.estado !== 'Baja definitiva');
      const resolvedCases = cases.filter(c => c.estado === 'Retenido' || c.estado === 'Baja definitiva');

      const MAX_DB_USAGE = 5000;
      const dbUsagePercent = Math.min((cases.length / MAX_DB_USAGE) * 100, 100);

      const selectedCase = cases.find(c => c.id === selectedCaseId);

      return (
        <div className="flex h-screen w-full overflow-hidden bg-slate-50">
          
          {/* Overlay Móvil */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-slate-900/50 z-40 md:hidden" 
              onClick={() => setIsSidebarOpen(false)}
            />
          )}

          {/* Modal Exportar Bajas */}
          {showExportBajasModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-fade-in border border-slate-100">
                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-6 mx-auto border border-red-100">
                  <Download size={32} />
                </div>
                <h3 className="text-xl font-bold text-center text-slate-800 mb-6">Exportar Bajas Definitivas</h3>
                
                <div className="space-y-4 mb-8">
                  <div className="flex gap-4">
                    <label className={`flex-1 flex items-center justify-center gap-2 cursor-pointer p-3 rounded-xl border transition-colors ${bajasDateMode === 'all' ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                      <input type="radio" checked={bajasDateMode === 'all'} onChange={() => setBajasDateMode('all')} className="hidden" />
                      <span className="text-sm font-bold">Todas las fechas</span>
                    </label>
                    <label className={`flex-1 flex items-center justify-center gap-2 cursor-pointer p-3 rounded-xl border transition-colors ${bajasDateMode === 'range' ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                      <input type="radio" checked={bajasDateMode === 'range'} onChange={() => setBajasDateMode('range')} className="hidden" />
                      <span className="text-sm font-bold">Rango específico</span>
                    </label>
                  </div>

                  {bajasDateMode === 'range' && (
                    <div className="grid grid-cols-2 gap-3 animate-fade-in pt-2">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">Fecha Inicio</label>
                        <input type="date" className="w-full border border-slate-300 bg-white rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 outline-none text-slate-700 font-medium" value={bajasStartDate} onChange={e => setBajasStartDate(e.target.value)} />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">Fecha Fin</label>
                        <input type="date" className="w-full border border-slate-300 bg-white rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 outline-none text-slate-700 font-medium" value={bajasEndDate} onChange={e => setBajasEndDate(e.target.value)} />
                      </div>
                    </div>
                  )}
                </div>

                <div className="flex gap-3">
                  <button onClick={() => setShowExportBajasModal(false)} className="flex-1 py-3 px-4 font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors shadow-sm">
                    Cancelar
                  </button>
                  <button onClick={handleExportBajas} className="flex-1 py-3 px-4 font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors shadow-sm">
                    Descargar Bajas
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Sidebar */}
          <aside className={`w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-50 fixed h-full transition-transform transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 md:relative`}>
            <div className="p-6 border-b border-slate-800/50">
              <div className="flex items-center gap-3">
                <img src="https://i.ibb.co/4nqvFQGM/logo.png" alt="Logo Cervantes" className="h-10 object-contain drop-shadow-sm" />
                <h1 className="text-sm font-bold text-white leading-tight uppercase tracking-wider">
                  Retención de<br/>Alumnos
                </h1>
              </div>
            </div>
            
            <nav className="flex-1 px-4 space-y-2 mt-4 overflow-y-auto custom-scrollbar">
              <button 
                onClick={() => navigateTo('list')}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${currentView === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <Users size={20} /> Casos Activos

    // --- DASHBOARD COMPONENT ---

      const uniqueAdvisors = useMemo(() => {
        const advSet = new Set(ADVISORS.map(a => a.name));
        cases.forEach(c => {
          if (c.asesor) advSet.add(c.asesor);
        });
        return Array.from(advSet).sort();
      }, [cases]);

      const filteredCases = useMemo(() => {
        return cases.filter(c => {
          if (filterCareer && c.carrera !== filterCareer) return false;
          if (filterReason && c.motivo !== filterReason) return false;
          if (filterStatus && c.estado !== filterStatus) return false;
          if (filterSubstatus && c.subestado !== filterSubstatus) return false;
          if (filterModalidad && c.modalidad !== filterModalidad) return false;
          if (filterNivel && c.nivelCaso !== filterNivel) return false;

      const total = filteredCases.length;

      const totalChart = includeInProgress ? total : (retained + dropped);

      const droppedPct = totalChart === 0 ? 0 : Math.round((dropped / totalChart) * 100);
      const inProgressPct = totalChart === 0 ? 0 : Math.round((inProgress / totalChart) * 100);

      const breakdownBaja = droppedCases.reduce((acc, c) => {

        acc[key] = (acc[key] || 0) + 1;

                <option value="">Todos los Asesores</option>

              <select className="flex-1 min-w-[140px] bg-white/60 backdrop-blur-sm border border-white/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-medium" value={filterNivel} onChange={e => setFilterNivel(e.target.value)}>
                <option value="">Todos los Niveles</option>

              </select>
              <select className="flex-1 min-w-[140px] bg-white/60 backdrop-blur-sm border border-white/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-medium" value={filterReason} onChange={e => setFilterReason(e.target.value)}>

              <select className="flex-1 min-w-[140px] bg-white/60 backdrop-blur-sm border border-white/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-medium" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                <option value="">Todos los Estados</option>

              <select className="flex-1 min-w-[140px] bg-white/60 backdrop-blur-sm border border-white/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-medium" value={filterSubstatus} onChange={e => setFilterSubstatus(e.target.value)}>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">

            </div>
            
            <div className="bg-emerald-50/60 backdrop-blur-md p-6 rounded-3xl shadow-lg border border-emerald-100/80 relative overflow-hidden transform transition-all hover:-translate-y-1">
              <div className="absolute -right-6 -top-6 opacity-20 text-emerald-500"><CheckCircle2 size={120} /></div>
              <p className="text-xs text-emerald-700 font-bold mb-2 uppercase tracking-widest relative z-10">Retenidos</p>
              <div className="flex items-end gap-2 relative z-10">
                <p className="text-5xl font-extrabold text-emerald-600">{retained}</p>
                <p className="text-xl font-bold text-emerald-500 mb-1">({retainedPct}%)</p>
              </div>
            </div>

            <div className="bg-red-50/60 backdrop-blur-md p-6 rounded-3xl shadow-lg border border-red-100/80 relative overflow-hidden transform transition-all hover:-translate-y-1">
              <div className="absolute -right-6 -top-6 opacity-20 text-red-500"><XCircle size={120} /></div>
              <p className="text-xs text-red-700 font-bold mb-2 uppercase tracking-widest relative z-10">Bajas</p>
              <div className="flex items-end gap-2 relative z-10">
                <p className="text-5xl font-extrabold text-red-600">{dropped}</p>
                <p className="text-xl font-bold text-red-500 mb-1">({droppedPct}%)</p>
              </div>
            </div>

            <div className="bg-indigo-50/60 backdrop-blur-md p-6 rounded-3xl shadow-lg border border-indigo-100/80 relative overflow-hidden transform transition-all hover:-translate-y-1">
              <div className="absolute -right-6 -top-6 opacity-20 text-indigo-500"><Clock size={120} /></div>
              <p className="text-xs text-indigo-700 font-bold mb-2 uppercase tracking-widest relative z-10">En Gestión</p>
              <div className="flex items-end gap-2 relative z-10">
                <p className="text-5xl font-extrabold text-indigo-600">{inProgress}</p>
                <p className="text-xl font-bold text-indigo-500 mb-1">({inProgressPct}%)</p>
              </div>
            </div>
          </div>

          <div className={`grid grid-cols-1 ${dropped > 0 ? 'lg:grid-cols-2' : ''} gap-6`}>
            {/* Gráfico de Barras Principal */}
            <div className="bg-white/60 backdrop-blur-md p-8 rounded-3xl shadow-lg border border-white/80">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <h3 className="font-bold text-slate-800 text-lg">Distribución de Resultados Globales</h3>

                  <input 
                    type="checkbox" 
                    className="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                    checked={includeInProgress}
                    onChange={(e) => setIncludeInProgress(e.target.checked)}

                  Incluir Casos en Gestión
                </label>
              </div>
              <div className="relative w-full h-12 bg-slate-200/50 rounded-2xl overflow-hidden flex shadow-inner backdrop-blur-sm">
                {totalChart > 0 ? (
                  <>
                    <div style={{ width: `${retainedPct}%` }} className="bg-gradient-to-r from-emerald-400 to-emerald-500 h-full flex items-center justify-center text-sm text-white font-bold transition-all duration-700 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]">
                      {retainedPct > 8 && `${retainedPct}%`}

                    {includeInProgress && (

                        {inProgressPct > 8 && `${inProgressPct}%`}
                      </div>
                    )}
                    <div style={{ width: `${droppedPct}%` }} className="bg-gradient-to-r from-red-400 to-red-500 h-full flex items-center justify-center text-sm text-white font-bold transition-all duration-700 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)] border-l border-white/20">
